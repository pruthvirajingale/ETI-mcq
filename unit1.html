<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ETI MCQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0b0e;
      --surface: #111318;
      --surface-2: #181b22;
      --border: #22262f;
      --border-hover: #3a3f52;
      --text-primary: #eef0f6;
      --text-secondary: #9098b0;
      --text-muted: #4a5068;
      --accent: #00d4e8;
      --accent-dim: rgba(0, 212, 232, 0.11);
      --accent-glow: rgba(0, 212, 232, 0.3);
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 64px 20px 80px;
      line-height: 1.6;
    }

    .container {
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header-eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    .eyebrow-text {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100px;
      padding: 20px 22px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-primary);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      animation: fadeUp 0.35s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-2px);
    }

    .card-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 0.97rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.45;
    }

    .card-arrow {
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: 10px;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    @media (max-width: 480px) {
      body { padding: 44px 16px 60px; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="header-eyebrow">
        <span class="dot"></span>
        <span class="eyebrow-text">MCQ</span>
      </div>
      <h1>Emerging Trends in Computer Engineering and Information Technology</h1>
    </header>

    <div class="card-grid">

      <a href="unit1tech.html" class="card">
        <span class="card-label">Unit 1</span>
        <span class="card-title">Techknowledge</span>
        <span class="card-arrow">→ Start</span>
      </a>

      <a href="unit1nirali.html" class="card">
        <span class="card-label">Unit 1</span>
        <span class="card-title">Nirali</span>
        <span class="card-arrow">→ Start</span>
      </a>

    </div>
  </div>

</body>
</html>
