    <style>
        :root {

            --surface: #111318;

            --border: #22262f;

            --text-primary: #eef0f6;
            --text-secondary: #9098b0;

            --correct-dim: rgba(0, 224, 122, 0.1);
            --wrong: #ff4d5a;
            --wrong-dim: rgba(255, 77, 90, 0.1);
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before { display: none; }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 48px 20px 80px;
            position: relative;
            z-index: 1;
        }

        header { margin-bottom: 36px; }

        .header-eyebrow {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        .eyebrow-text {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        h1 {
            font-size: 1.55rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .divider { display: none; }

        .progress-bar {
            height: 2px;
            background: var(--border);
            border-radius: 99px;
            margin-bottom: 36px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #7c3aed);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        .q-block {
            margin-bottom: 28px;
            animation: fadeUp 0.35s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-block:nth-child(1) { animation-delay: 0.05s; }
        .q-block:nth-child(2) { animation-delay: 0.1s; }
        .q-block:nth-child(3) { animation-delay: 0.15s; }
        .q-block:nth-child(4) { animation-delay: 0.2s; }
        .q-block:nth-child(5) { animation-delay: 0.25s; }

        .q-number {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .q-text {
            font-size: 0.97rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 14px;
            display: block;
            line-height: 1.55;
        }

        /* Hide native radio */
        input[type="radio"] { display: none; }

        .opt-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 7px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s, color 0.18s;
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: var(--surface);
        }

        .opt-label:hover {
            border-color: var(--border-hover);
            background: var(--surface-2);
            color: var(--text-primary);
        }

        .radio-dot { display: none; }

        /* Checked — highlight the row only */
        input[type="radio"]:checked + .opt-label {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--text-primary);

        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            font-family: 'Sora', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
            margin-top: 8px;
            letter-spacing: 0.01em;
            box-shadow: 0 0 18px var(--accent-glow);
        }

        .btn-submit:hover {
            opacity: 0.88;
            transform: translateY(-1px);
            box-shadow: 0 4px 28px var(--accent-glow);
        }

        .btn-submit:active { transform: translateY(0); }

        .score-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.83rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 12px;
        }

            font-weight: 600;
            color: var(--accent);
        }

        .review-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 10px;
            animation: fadeUp 0.3s ease both;
        }

        .review-card .q-text {
            font-size: 0.93rem;
            margin-bottom: 14px;
        }

        .answer-row {
            padding: 8px 12px;
            border-radius: 7px;
            margin-bottom: 7px;
        }

        .answer-row.correct { background: var(--correct-dim); border: 1px solid rgba(0,224,122,0.18); }
        .answer-row.wrong { background: var(--wrong-dim); border: 1px solid rgba(255,77,90,0.13); }

        .answer-icon { display: none; }

        .answer-meta {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .answer-row.correct .answer-meta { color: var(--correct); }
        .answer-row.wrong .answer-meta { color: var(--wrong); }

        .answer-text { font-size: 0.86rem; color: var(--text-primary); font-weight: 500; }

        .explanation {
            font-size: 0.84rem;
            color: var(--text-secondary);
            line-height: 1.6;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            margin-top: 4px;

        .btn-retry {

            padding: 12px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Sora', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;

        }
        .btn-retry:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--surface); }

        #review-section { display: none; }

    // --- Shuffle helper ---
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // Randomize question order; also randomize each question's option order
    // and track where the correct answer ended up.
    const shuffledQuestions = shuffle(quizData).map(item => {
        const correctText = item.opts[item.ans];
        const shuffledOpts = shuffle(item.opts);
        const newAnsIndex = shuffledOpts.indexOf(correctText);
        return { ...item, opts: shuffledOpts, ans: newAnsIndex, correctText };
    });

    const qList = document.getElementById('questions-list');

    // Build quiz
    shuffledQuestions.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.innerHTML = `
            <div class="q-number">Question ${i + 1} of ${shuffledQuestions.length}</div>
            <span class="q-text">${item.q}</span>
            ${item.opts.map((o, oi) => `
                <input type="radio" name="q${i}" id="q${i}o${oi}" value="${oi}">
                <label class="opt-label" for="q${i}o${oi}">
                    <span class="radio-dot"></span>${o}
                </label>
            `).join('')}
        `;
        qList.appendChild(div);
    });

    // Progress bar
    shuffledQuestions.forEach((_, i) => {
        qList.querySelectorAll(`input[name="q${i}"]`).forEach(radio => {
            radio.addEventListener('change', updateProgress);
        });
    });

    function updateProgress() {
        const answered = shuffledQuestions.filter((_, i) =>
            document.querySelector(`input[name="q${i}"]:checked`)
        ).length;
        document.getElementById('progress').style.width = `${(answered / shuffledQuestions.length) * 100}%`;
    }

    function processQuiz() {
        let score = 0;
        const expList = document.getElementById('explanations-list');
        expList.innerHTML = '';

        // Results shown in the same shuffled order as the quiz
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const userVal = selected ? parseInt(selected.value) : null;
            const isCorrect = userVal === item.ans;
            if (isCorrect) score++;

            const card = document.createElement('div');
            card.className = 'review-card';
            card.style.animationDelay = `${i * 0.07}s`;

            let userRow = '';
            if (userVal !== null && !isCorrect) {
                userRow = `
                    <div class="answer-row wrong">
                        <div class="answer-meta">Your Answer</div>
                        <div class="answer-text">${item.opts[userVal]}</div>
                    </div>
                `;
            }

            card.innerHTML = `
                <span class="q-text">${i + 1}. ${item.q}</span>
                ${userRow}
                <div class="answer-row correct">
                    <div class="answer-meta">Correct Answer</div>
                    <div class="answer-text">${item.correctText}</div>
                </div>
                <div class="explanation">${item.exp}</div>
            `;
            expList.appendChild(card);
        });

        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('review-section').style.display = 'block';

        const pct = Math.round((score / shuffledQuestions.length) * 100);
        document.getElementById('final-score').innerHTML = `
            <span class="score-val">${score} / ${shuffledQuestions.length}</span> correct &nbsp;·&nbsp; ${pct}%
        `;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
